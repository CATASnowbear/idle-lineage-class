name = "transfer"
main = "src/index.js"
# SQLite-backed Durable Object 在較新的 runtime 才穩定,用近期日期。
compatibility_date = "2025-05-01"

# 這個 Worker 需要對外網址(前端從 GitHub Pages / file:// 呼叫),
# 故開 workers.dev,部署後會得到 https://transfer.<你的帳號子網域>.workers.dev
workers_dev = true

# 單一 Durable Object:同時管「轉移碼→存檔」與 per-IP 限流(強一致、寫入額度十萬級,免費版即可)。
[[durable_objects.bindings]]
name = "TRANSFER"
class_name = "Transfer"

# 免費版只支援 SQLite-backed DO,必須用 new_sqlite_classes 宣告。
[[migrations]]
tag = "v1"
new_sqlite_classes = ["Transfer"]

# 可調參數(改完 redeploy 生效):
#   ALLOW_ORIGINS  允許的網站來源,逗號分隔;"null" 代表直接開 index.html(file://)。
#   TTL_MS         轉移碼存活毫秒(預設 10 分鐘)。
#   RATE_PER_MIN   每個 IP 每分鐘最多幾次請求。
#   MAX_SAVE_BYTES 單筆存檔字串上限(位元組)。
[vars]
ALLOW_ORIGINS = "https://pp771007.github.io,http://localhost:8799,http://127.0.0.1:8799,null"
TTL_MS = "600000"
RATE_PER_MIN = "30"
MAX_SAVE_BYTES = "2000000"
